<!DOCTYPE html>
<html>
<head>
    <title>VibeShield</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">

    <p class="subtitle">SECURITY ANALYSIS</p>

    <h1>
        Find vulnerabilities<br>
        <span>before they find you</span>
    </h1>

    <div class="window input-window">
        <div class="titlebar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>

        <div class="content">
            <input id="repoInput" placeholder="https://github.com/user/repo">
            <button id="scanBtn">Analyze</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
